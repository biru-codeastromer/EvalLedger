databases:
  - name: evalledger-db
    plan: free
    databaseName: evalledger
    user: evalledger
    postgresMajorVersion: "16"

services:
  - type: redis
    name: evalledger-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

  - type: web
    name: evalledger-api
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health/live
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_URL
        sync: false
      - key: FRONTEND_URL
        value: https://evalledger-frontend.vercel.app
      - key: DATABASE_URL
        fromDatabase:
          name: evalledger-db
          property: connectionString
      - key: SYNC_DATABASE_URL
        fromDatabase:
          name: evalledger-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: evalledger-redis
          type: redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: evalledger-redis
          type: redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: evalledger-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: '["https://evalledger-frontend.vercel.app"]'
      - key: STORAGE_BACKEND
        value: local
      - key: STORAGE_BUCKET
        sync: false
      - key: STORAGE_S3_ENDPOINT_URL
        sync: false
      - key: STORAGE_S3_ACCESS_KEY_ID
        sync: false
      - key: STORAGE_S3_SECRET_ACCESS_KEY
        sync: false
      - key: STORAGE_S3_REGION
        sync: false
      - key: STORAGE_S3_PRESIGN_ENDPOINT
        sync: false

  # NOTE: Render free tier does not support background workers.
  # Celery worker is omitted. Async contamination checks will not process
  # until a paid plan or alternative deployment (e.g. Fly.io) is used.
  # The API itself works fully without the worker.
