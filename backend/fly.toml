# Fly.io deployment configuration for EvalLedger backend.
#
# App:    evalledger
# Region: iad (Washington D.C.)
#
# Process groups (single image, two process types):
#   web    – FastAPI / Uvicorn, exposed via HTTPS on port 443
#   worker – Celery contamination worker, internal only
#
# Managed resources provisioned separately with flyctl (see docs/operations/deployment.md):
#   evalledger-db      – Fly Managed Postgres 16
#   evalledger-redis   – Upstash Redis via Fly extension
#   evalledger-storage – Tigris S3-compatible object storage via Fly extension

app            = "evalledger"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

# Non-secret environment variables shared by all process groups.
# Secrets (DATABASE_URL, SYNC_DATABASE_URL, REDIS_URL, JWT_SECRET_KEY, storage
# credentials, CORS_ORIGINS, APP_URL, FRONTEND_URL) are managed with:
#   fly secrets set KEY=value --app evalledger
[env]
  APP_ENV            = "production"
  RUN_MIGRATIONS     = "false"   # Migrations run via the release command below; never in-process.
  STORAGE_BACKEND    = "s3"
  STORAGE_S3_REGION  = "auto"   # Tigris default; override if using a different provider.

# Run Alembic migrations in a short-lived release VM before rolling out new
# machines. If this exits non-zero the deploy is automatically rolled back.
# Because RUN_MIGRATIONS=false, the entrypoint skips its own migration check
# and directly exec's this command.
[deploy]
  release_command = "uv run alembic upgrade head"
  strategy        = "rolling"

# Process group commands – both inherit the Dockerfile ENTRYPOINT
# (bin/docker-entrypoint.sh) which is prepended automatically.
[processes]
  web    = "uv run uvicorn app.main:app --host 0.0.0.0 --port 8000"
  worker = "uv run celery -A app.tasks.contamination_tasks.celery_app worker --loglevel=info --concurrency=2"

# HTTP/HTTPS service – only the `web` process is publicly reachable.
[[services]]
  processes            = ["web"]
  internal_port        = 8000
  protocol             = "tcp"
  auto_stop_machines   = "stop"
  auto_start_machines  = true
  min_machines_running = 1

  [[services.ports]]
    port        = 80
    handlers    = ["http"]
    force_https = true

  [[services.ports]]
    port     = 443
    handlers = ["tls", "http"]

  [services.concurrency]
    type       = "connections"
    hard_limit = 25
    soft_limit = 20

  # Fly uses this probe to gate traffic to new machines after a deploy.
  [[services.http_checks]]
    interval     = "10s"
    timeout      = "5s"
    grace_period = "60s"
    method       = "GET"
    path         = "/health/live"

# Machine sizes per process group.
[[vm]]
  processes = ["web"]
  memory    = "512mb"
  cpu_kind  = "shared"
  cpus      = 1

[[vm]]
  processes = ["worker"]
  memory    = "512mb"
  cpu_kind  = "shared"
  cpus      = 1
