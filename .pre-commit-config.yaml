repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.0
    hooks:
      - id: ruff
        name: ruff (backend)
        args: ["--fix"]
        files: ^backend/.*\.py$
      - id: ruff-format
        name: ruff-format (backend)
        files: ^backend/.*\.py$
      - id: ruff
        name: ruff (cli)
        args: ["--fix"]
        files: ^cli/.*\.py$
      - id: ruff-format
        name: ruff-format (cli)
        files: ^cli/.*\.py$
