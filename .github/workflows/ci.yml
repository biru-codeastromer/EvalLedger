name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: evalledger
          POSTGRES_PASSWORD: evalledger
          POSTGRES_DB: evalledger
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U evalledger"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://evalledger:evalledger@localhost:5432/evalledger
      REDIS_URL: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.11"
      - run: uv sync --frozen --group dev
      - run: uv run ruff check .
      - run: uv run mypy app
      # Apply migrations to the service Postgres so the integration tests run.
      - run: uv run alembic upgrade head
      - run: uv run pytest --cov=app --cov-report=term-missing

  cli:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.11"
      - run: uv sync --frozen --group dev
      - run: uv run ruff check .
      - run: uv run mypy evalledger
      - run: uv run pytest

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - run: npx playwright install --with-deps chromium
      - run: pnpm test:e2e
